name: Tweet on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Versión (ej: v1.0.1)'
        default: 'v1.0.1'
      url:
        description: 'URL del release'
        default: 'https://github.com/albertd987/forocoches-plus/releases/latest'

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        run: |
          echo "API_KEY length: ${#TWITTER_API_KEY}"
          echo "API_SECRET length: ${#TWITTER_API_SECRET}"
          echo "ACCESS_TOKEN length: ${#TWITTER_ACCESS_TOKEN}"
          echo "ACCESS_SECRET length: ${#TWITTER_ACCESS_SECRET}"
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

      - name: Tweet new release
        run: |
          npm install twitter-api-v2 2>/dev/null
          node -e "
          const { TwitterApi } = require('twitter-api-v2');
          const client = new TwitterApi({
            appKey: process.env.TWITTER_API_KEY,
            appSecret: process.env.TWITTER_API_SECRET,
            accessToken: process.env.TWITTER_ACCESS_TOKEN,
            accessSecret: process.env.TWITTER_ACCESS_SECRET,
          });
          const tag = process.env.TAG || '${{ github.event.release.tag_name }}';
          const url = process.env.URL || '${{ github.event.release.html_url }}';
          const text = \`🚀 Forocoches+ \${tag} ya disponible\n\nFiltra usuarios, bloquea anuncios y recibe notificaciones de MPs.\n\nDescarga: \${url}\n\n#Forocoches #Android\`;
          client.v2.tweet(text).then(() => console.log('Tweet enviado')).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TAG: ${{ github.event.inputs.tag }}
          URL: ${{ github.event.inputs.url }}
